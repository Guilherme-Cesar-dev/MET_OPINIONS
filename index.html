<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>MET Avaliar - Obras de Arte</title>
</head>
<body>
    <header class="header">
        <h3>THE MET</h3>
        <h4>Avalie obras de arte!</h4>
        <a href="perfil.html" class="btn-perfil" id="user-link">Carregando...</a>
    </header>

    <script>
        // Exibir nome do usuário no header
        const user = JSON.parse(localStorage.getItem('user_perfil')) || { nome: 'Meu Perfil' };
        document.getElementById('user-link').textContent = (user.nome || 'Meu Perfil');
    </script>
    <div class="container-main">
        <div class="gallery">
            <div id="left" class="artwork-display"></div>
        </div>

        <div class="actions">
            <button id="favoritar" class="btn-secondary">Favoritar</button>
            <button id="load-more" onclick="searchOBJ()" class="btn-primary">Próxima Imagem</button>
        </div>

        <div id="back" class="quote-section"></div>
    </div>

    <script src="teste.js"></script>
</body>
</html>
